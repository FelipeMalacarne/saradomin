apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: saradomin   # pin to node with Intel GPU
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              gpu.intel.com/i915: 1   # Intel QuickSync via device plugin
            limits:
              cpu: 2000m
              memory: 2048Mi
              gpu.intel.com/i915: 1
          env:
            - name: TZ
              value: "America/Sao_Paulo"
          ports:
            - containerPort: 8096
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data/media
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: /data/media   # large library on NVMe, not replicated in Longhorn
            type: Directory
