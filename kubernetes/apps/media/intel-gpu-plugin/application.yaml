apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-gpu-plugin
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://intel.github.io/helm-charts
      chart: intel-device-plugins-operator
      targetRevision: "0.x"
    - repoURL: https://github.com/felipemalacarne/saradomin.git
      targetRevision: HEAD
      path: kubernetes/apps/media/intel-gpu-plugin
      directory:
        include: "gpu-device-plugin.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
