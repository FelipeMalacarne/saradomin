apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/felipemalacarne/saradomin.git
    targetRevision: HEAD
    path: kubernetes/apps/networking/pihole
    directory:
      include: "{deployment.yaml,pvc.yaml,secrets.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
