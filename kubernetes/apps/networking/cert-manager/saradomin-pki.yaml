# Step 1: Self-signed bootstrap issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selfSigned: {}
---
# Step 2: CA certificate (lives in cert-manager namespace so ClusterIssuer can read it)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saradomin-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  isCA: true
  commonName: saradomin-internal-ca
  secretName: saradomin-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA-backed ClusterIssuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: saradomin-ca-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ca:
    secretName: saradomin-ca-secret
---
# Step 4: Wildcard cert for *.saradomin (in networking namespace for Traefik TLSStore)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saradomin-wildcard
  namespace: networking
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: saradomin-tls
  dnsNames:
    - "*.saradomin"
    - "saradomin"
  issuerRef:
    name: saradomin-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
