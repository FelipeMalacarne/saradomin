apiVersion: v1
kind: Service
metadata:
  name: coredns-saradomin
  namespace: networking
  annotations:
    tailscale.com/hostname: "dns-saradomin"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: coredns-saradomin
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
