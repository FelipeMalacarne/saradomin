apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/felipemalacarne/saradomin.git
    targetRevision: HEAD
    path: kubernetes/apps/monitoring/grafana-dashboards
    directory:
      include: "power-dashboard.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
