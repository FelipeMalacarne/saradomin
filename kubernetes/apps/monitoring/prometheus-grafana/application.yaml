apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "65.x"
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
            loadBalancerClass: tailscale
            annotations:
              tailscale.com/hostname: "grafana"
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: changeme   # override with secret post-deploy
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
