apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.x"
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
            loadBalancerClass: tailscale
            annotations:
              tailscale.com/hostname: "grafana"
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: changeme   # override with secret post-deploy
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1024Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          enabled: false
        prometheus-node-exporter:
          extraArgs:
            - --collector.rapl
          containerSecurityContext:
            capabilities:
              add:
                - DAC_READ_SEARCH
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
