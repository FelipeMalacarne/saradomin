apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.x"
    helm:
      values: |
        grafana:
          service:
            type: ClusterIP
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web
            hosts:
              - grafana.saradomin
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: changeme   # override with secret post-deploy
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1024Mi
            additionalScrapeConfigs:
              - job_name: exportarr-radarr
                static_configs:
                  - targets: ['exportarr.media.svc.cluster.local:9707']
              - job_name: exportarr-sonarr
                static_configs:
                  - targets: ['exportarr.media.svc.cluster.local:9708']
              - job_name: exportarr-prowlarr
                static_configs:
                  - targets: ['exportarr.media.svc.cluster.local:9709']
              - job_name: exportarr-bazarr
                static_configs:
                  - targets: ['exportarr.media.svc.cluster.local:9710']
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          enabled: false
        prometheus-node-exporter:
          extraArgs:
            - --collector.rapl
          podSecurityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          containerSecurityContext:
            readOnlyRootFilesystem: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
