global:
  domain: argocd.saradomin  # Tailscale-only, no public DNS needed

configs:
  params:
    server.insecure: true   # Traefik terminates TLS
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

repoServer:
  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age
  volumeMounts:
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /.config/sops/age
      name: sops-age
  initContainers:
    - name: install-ksops
      image: alpine:3
      command:
        - sh
        - -c
        - |
          apk add --no-cache curl tar
          curl -sL "https://github.com/viaduct-ai/kustomize-sops/releases/download/v4.4.0/ksops_4.4.0_Linux_x86_64.tar.gz" \
            | tar -xz -C /custom-tools/ ksops
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /custom-tools/ kustomize
          chmod +x /custom-tools/ksops /custom-tools/kustomize
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - argocd.saradomin
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1536Mi
